<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply • Havenmark Homes</title>
  <meta name="description" content="Apply for housing with Havenmark Homes." />
  <meta name="theme-color" content="#F1995A" />
  <link rel="stylesheet" href="styles.css" />
  <style> .back { color: #8a5b3d; text-decoration: none; font-weight: 600; } .back:hover{ text-decoration: underline;} </style>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <div class="brand">HAVENMARK HOMES</div>
    </div>
  </header>

  <main class="container" style="margin: 1.5rem auto 2rem;">
    <p><a class="back" href="index.html">← Back to Home</a></p>
    <div class="form-wrap" role="form" aria-labelledby="applyTitle">
      <h1 id="applyTitle" class="section-title" style="margin-top:0">Apply for Housing</h1>
      <p class="helper" style="text-align:center; max-width:60ch; margin:0 auto 1rem;">Please complete the form below. A member of our team will contact you within 2–3 working days.</p>
      <form id="applyForm" novalidate>
        <label for="fullName">Full name</label>
        <input id="fullName" name="fullName" type="text" autocomplete="name" required placeholder="e.g., Alex Morgan" />

        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" required placeholder="name@example.com" />

        <label for="phone">Phone (optional)</label>
        <input id="phone" name="phone" type="tel" autocomplete="tel" placeholder="e.g., 07123 456789" />

        <label for="postcode">Postcode</label>
        <input id="postcode" name="postcode" type="text" inputmode="text" required placeholder="e.g., SW1A 1AA" />

        <label for="type">Housing type</label>
        <select id="type" name="type" required>
          <option value="" disabled selected>Select an option</option>
          <option>Affordable rented home</option>
          <option>Shared ownership</option>
          <option>Repairs &amp; maintenance</option>
          <option>Other enquiry</option>
        </select>

        <label for="message">Tell us a bit more</label>
        <textarea id="message" name="message" placeholder="Any needs, timeframes, or preferences"></textarea>

        <div class="form-actions">
          <button class="btn" type="submit">Submit application</button>
          <span class="helper">By submitting, you agree to our <a href="#" aria-label="Privacy notice (placeholder)">privacy notice</a>.</span>
        </div>
        <p id="formMsg" class="success" style="display:none;">Thank you — your application has been received.</p>
      </form>
    </div>
  </main>

  <footer class="site">
    <div class="container">© 2024 Havenmark Homes • A UK Housing Association</div>
  </footer>

  <script>
    // Minimal client-side validation + redirect to thank-you
    const form = document.getElementById('applyForm');
    const msg = document.getElementById('formMsg');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (!form.reportValidity()) return;
      // In production, POST to your backend or a forms service here.
      // Simulate success then redirect:
      msg.style.display = 'block';
      setTimeout(() => window.location.href = 'thank-you.html', 600);
    });
  </script>
</body>
</html>
